<head>
<meta charset="UTF-8">

<meta property="og:description" content="Play the same text quests AI models played. Compare your choices with the AI cohort in real time.">

<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-2: #0f151d;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #c9d1d9;
  --soft-muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --clr: #ffd863;
  --frame: rgba(255, 216, 99, 0.42);
}
body {
  background:
    linear-gradient(rgba(13,17,23,0.78), rgba(13,17,23,0.93)),
    url('play/questplay/background.jpg') center top / cover fixed,
    var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
}
.navbar { background: var(--surface); border-bottom: 1px solid var(--border); }
a { color: var(--accent); }
.text-muted { color: var(--muted) !important; }

.quest-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
.quest-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.diff-badge { font-size: 0.75rem; font-weight: 700; padding: 0.2em 0.7em; border-radius: 12px; border: 1px solid currentColor; }

.play-shell { min-height: calc(100vh - 73px); }
.play-wrap { width: min(1180px, 100%); margin: 0 auto; padding: 0.75rem; }
.play-topbar {
  position: static; z-index: 10;
  display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
  margin: 0 0 0.75rem; padding: 0.75rem;
  background: rgba(13,17,23,0.92); border: 1px solid var(--border); border-radius: 8px;
  backdrop-filter: blur(10px);
}
.play-title { min-width: 0; }
.play-title h1 { font-size: 1rem; margin: 0; line-height: 1.25; }
.play-meta { color: var(--soft-muted); font-size: 0.78rem; margin-top: 0.1rem; }
.play-actions { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
.play-action {
  min-width: 2.3rem; min-height: 2.3rem; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
}
.play-action:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.play-action:disabled { opacity: 0.45; }
.play-layout { display: grid; gap: 0.75rem; }
.story-column, .ai-column { min-width: 0; }
.media-stage {
  background: rgba(0,0,0,0.72); border: 1px solid var(--frame);
  border-radius: 8px; margin-bottom: 0.75rem; overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 12px 32px rgba(0,0,0,0.22);
}
.media-frame {
  min-height: 132px; aspect-ratio: 16 / 9;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(circle at 50% 40%, rgba(88,166,255,0.14), transparent 42%),
    linear-gradient(135deg, rgba(255,216,99,0.08), rgba(88,166,255,0.05)),
    #070a0f;
}
.media-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
.media-placeholder {
  width: 100%; height: 100%; min-height: 132px;
  display: flex; align-items: center; justify-content: center;
  color: rgba(201,209,217,0.5); font-size: 0.78rem; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.obs-panel {
  background: rgba(15,21,29,0.94); border: 1px solid var(--frame);
  border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem;
  line-height: 1.72; white-space: pre-wrap;
  animation: fadeIn 0.25s ease;
  box-shadow: 0 12px 32px rgba(0,0,0,0.18);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.params-strip { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; }
.param-pill { background: rgba(13,17,23,0.88); border: 1px solid var(--border); border-radius: 4px; padding: 0.25rem 0.6rem; font-size: 0.78rem; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }

.choices-panel {
  background: rgba(15,21,29,0.9); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.55rem; margin-bottom: 0.75rem;
}
.choice-btn { display: block; width: 100%; text-align: left; background: rgba(22,27,34,0.96); border: 1px solid var(--border); color: var(--text); padding: 0.78rem 0.9rem; margin-bottom: 0.5rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; line-height: 1.45; transition: border-color 0.15s, background 0.15s; }
.choice-btn:last-child { margin-bottom: 0; }
.choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(88,166,255,0.1); }
.choice-btn.inactive { opacity: 0.4; cursor: default; }
.choice-btn:disabled { cursor: default; }

.cohort-panel { background: rgba(15,21,29,0.94); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; animation: fadeIn 0.2s ease; }
.cohort-inline { padding: 1rem 1.25rem 1.25rem; border-top: 1px solid var(--border); }
.panel-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--soft-muted); margin-bottom: 0.5rem; }

.family-pill { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 0.2em 0.65em; border-radius: 12px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.family-pill:hover, .family-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.history-section { margin-top: 0; }
.history-item { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.4rem; background: var(--surface); overflow: hidden; }
.history-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.55rem 1rem; cursor: pointer; user-select: none; transition: background 0.15s; }
.history-header:hover { background: rgba(88,166,255,0.05); }
.history-step { font-size: 0.75rem; font-weight: 700; color: var(--muted); min-width: 1.8rem; text-align: right; }
.history-choice { flex: 1; font-size: 0.88rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-agree { font-size: 0.78rem; font-weight: 600; }
.history-chevron { font-size: 0.6rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
.history-item.open .history-chevron { transform: rotate(90deg); }
.history-item .cohort-inline { display: none; }
.history-item.open .cohort-inline { display: block; }

.cohort-row { margin-bottom: 0.65rem; }
.cohort-row.player-choice { border-left: 3px solid var(--accent); padding-left: 0.5rem; background: rgba(88,166,255,0.06); border-radius: 0 4px 4px 0; }
.cohort-label { font-size: 0.85rem; margin-bottom: 0.25rem; color: var(--text); }
.cohort-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
.success-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; flex: 1; }
.success-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.3s; }
.cohort-pct { font-size: 0.8rem; color: var(--muted); min-width: 3rem; text-align: right; }

.outcome-badge { font-size: 1.1rem; font-weight: 700; padding: 0.4em 1.1em; border-radius: 6px; letter-spacing: 0.03em; }
.outcome-SUCCESS { background: var(--green); color: #0d1117; }
.outcome-FAILURE { background: var(--red); color: #fff; }
.outcome-DEAD { background: var(--red); color: #fff; }

.path-table { font-size: 0.88rem; }
.agree-yes { color: var(--green); }
.agree-no { color: var(--muted); }

.game-clr { color: var(--clr); }
.game-fix { font-family: 'SF Mono', 'Fira Code', monospace; white-space: pre; }

.spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 3rem; }

.lang-toggle { display: flex; gap: 0.3rem; }
.lang-pill { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 0.3em 0.8em; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.lang-pill:hover { border-color: var(--accent); color: var(--text); }
.lang-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.5rem 0.9rem; width: 100%; font-size: 0.95rem; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.card-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.card-table .table { color: var(--text); margin-bottom: 0; }
.card-table .table th { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; padding: 0.5rem 1rem; border-color: var(--border); }
.card-table .table td { padding: 0.4rem 1rem; border-color: var(--border); }

@media (min-width: 860px) {
  .play-wrap { padding: 1.25rem; }
  .play-topbar { margin-bottom: 1rem; }
  .play-title h1 { font-size: 1.25rem; }
  .play-layout { grid-template-columns: minmax(0, 1fr) 340px; align-items: start; }
  .ai-column { position: sticky; top: 1rem; }
  .obs-panel { padding: 1.35rem; }
}

@media (max-width: 420px) {
  .navbar .container { gap: 0.75rem; }
  .navbar-brand { font-size: 1rem; }
  .play-actions { gap: 0.3rem; }
  .play-action { min-width: 2.15rem; min-height: 2.15rem; }
  .history-agree { display: none; }
}
</style>
</head>
