.params-strip { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }

.choice-btn { display: block; width: 100%; text-align: left; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: border-color 0.15s; }
.choice-btn:hover:not(:disabled) { border-color: var(--accent); }
.choice-btn.inactive { opacity: 0.4; cursor: default; }

.cohort-inline { padding: 1rem 1.25rem 1.25rem; border-top: 1px solid var(--border); }

.family-pill { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 0.2em 0.65em; border-radius: 12px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.family-pill:hover, .family-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.history-section { margin-top: 1.5rem; }
.history-item { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.4rem; background: var(--surface); overflow: hidden; }
.history-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.55rem 1rem; cursor: pointer; user-select: none; transition: background 0.15s; }
.history-header:hover { background: rgba(88,166,255,0.05); }
.history-step { font-size: 0.75rem; font-weight: 700; color: var(--muted); min-width: 1.8rem; text-align: right; }
.history-choice { flex: 1; font-size: 0.88rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-agree { font-size: 0.78rem; font-weight: 600; }
.history-chevron { font-size: 0.6rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
.history-item.open .history-chevron { transform: rotate(90deg); }
.history-item .cohort-inline { display: none; }
.history-item.open .cohort-inline { display: block; }

.cohort-row { margin-bottom: 0.65rem; }
.cohort-row.player-choice { border-left: 3px solid var(--accent); padding-left: 0.5rem; background: rgba(88,166,255,0.06); border-radius: 0 4px 4px 0; }
.cohort-label { font-size: 0.85rem; margin-bottom: 0.25rem; color: var(--text); }
.cohort-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
.success-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; flex: 1; }
.success-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.3s; }

.outcome-badge { font-size: 1.1rem; font-weight: 700; padding: 0.4em 1.1em; border-radius: 6px; letter-spacing: 0.03em; }
.outcome-SUCCESS { background: var(--green); color: #0d1117; }

.path-table { font-size: 0.88rem; }

.game-clr { color: var(--clr); }

.spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 3rem; }

.search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.5rem 0.9rem; width: 100%; font-size: 0.95rem; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.card-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.card-table .table { color: var(--text); margin-bottom: 0; }
.card-table .table th { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; padding: 0.5rem 1rem; border-color: var(--border); }
.card-table .table td { padding: 0.4rem 1rem; border-color: var(--border); }

<nav class="navbar navbar-dark py-3">

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ---- Tag parser (ported from space-rangers-quest) ----

const SIMPLE_TAGS = ['clr', 'clrEnd', '/clr', 'fix', '/fix', '/format', '/color'];

function splitStringToTokens(str) {
  const out = [];
  let pos = 0;
  let text = '';

  const flushText = () => {
    if (text.length > 0) { out.push({ type: 'text', text }); text = ''; }
  };

  while (pos < str.length) {
    let found = false;
    for (const tag of SIMPLE_TAGS) {
      const candidate = '<' + tag + '>';
      if (str.slice(pos, pos + candidate.length) === candidate) {
        flushText();
        out.push({ type: 'tag', tag });
        pos += candidate.length;
        found = true;
        break;
      }
    }
    if (found) continue;

    const formatMatch = str.slice(pos).match(/^<format=?(left|right|center)?,?(\d+)?>/);
    if (formatMatch) {
      flushText();
      pos += formatMatch[0].length;
      const kind = formatMatch[1];
      const n = formatMatch[2] ? parseInt(formatMatch[2]) : undefined;
      out.push({ type: 'format', format: (kind && n !== undefined) ? { kind, numberOfSpaces: n } : undefined });
      continue;
    }

    const colorMatch = str.slice(pos).match(/^<color=?(\d+)?,?(\d+)?,?(\d+)?>/);
    if (colorMatch) {
      flushText();
      pos += colorMatch[0].length;
      const r = colorMatch[1] ? parseInt(colorMatch[1]) : undefined;
      const g = colorMatch[2] ? parseInt(colorMatch[2]) : undefined;
      const b = colorMatch[3] ? parseInt(colorMatch[3]) : undefined;
      out.push({ type: 'color', color: (r !== undefined && g !== undefined && b !== undefined) ? { r, g, b } : undefined });
      continue;
    }

    text += str[pos];
    pos++;
  }
  flushText();
  return out;
}

function formatTokens(parsed) {
  const out = [];
  let clrCount = 0;
  let fixCount = 0;
  let format = undefined;
  let color = undefined;

  for (const token of parsed) {
    if (token.type === 'text') {
      token.text.split(/\r\n|\n/).forEach((line, index, arr) => {
        const haveNext = index !== arr.length - 1;
        out.push({ type: 'text', text: line, isClr: clrCount > 0 || undefined, isFix: fixCount > 0 || undefined, color });
        if (haveNext) out.push({ type: 'newline', isFix: fixCount > 0 || undefined });
      });
    } else if (token.type === 'format') {
      if (!format && token.format) format = { format: token.format, startedAt: out.length };
    } else if (token.type === 'color') {
      if (!color && token.color) color = token.color;
    } else if (token.type === 'tag') {
      const tag = token.tag;
      if (tag === '/color') { color = undefined; }
      else if (tag === 'fix') { fixCount++; }
      else if (tag === '/fix') { fixCount--; }
      else if (tag === 'clr') { clrCount++; }
      else if (tag === 'clrEnd' || tag === '/clr') { clrCount--; }
      else if (tag === '/format') {
        if (format) {
          let length = 0;
          for (const t of out.slice(format.startedAt)) {
            length += t.type === 'text' ? t.text.length : 0;
          }
          const padNeeded = Math.max(0, format.format.numberOfSpaces - length);
          const leftPad = padNeeded
            ? format.format.kind === 'left' ? ' '.repeat(padNeeded)
            : format.format.kind === 'center' ? ' '.repeat(Math.floor(padNeeded / 2))
            : ''
            : '';
          const rightPad = padNeeded
            ? format.format.kind === 'right' ? ' '.repeat(padNeeded)
            : format.format.kind === 'center' ? ' '.repeat(Math.ceil(padNeeded / 2))
            : ''
            : '';
          if (leftPad) out.splice(format.startedAt, 0, { type: 'text', text: leftPad, isClr: clrCount > 0 || undefined, isFix: fixCount > 0 || undefined });
          if (rightPad) out.push({ type: 'text', text: rightPad, isClr: clrCount > 0 || undefined, isFix: fixCount > 0 || undefined });
        }
        format = undefined;
      }
    }
  }
  return out;
}

function QuestTags({ str }) {
  const nbsp = ' ';
  const tokens = formatTokens(splitStringToTokens(str || ''));
  return (
    <>
      <span>{nbsp}</span>
      {tokens.map((tok, i) => {
        if (tok.type === 'newline') {
          return <span key={i}><br />{nbsp}</span>;
        }
        const style = tok.color ? { color: `rgb(${tok.color.r},${tok.color.g},${tok.color.b})` } : undefined;
        const cls = [tok.isClr ? 'game-clr' : '', tok.isFix ? 'game-fix' : ''].filter(Boolean).join(' ') || undefined;
        return <span key={i} className={cls} style={style}>{tok.text}</span>;
      })}
    </>
  );
}

// ---- Helpers ----

function normalizeChoice(text) {
  return String(text == null ? '' : text)
    .replace(/<clr>|<clrEnd>|<\/clr>/g, '')
    .trim()
    .toLowerCase();
}

function stripClr(s) {
  return String(s == null ? '' : s).replace(/<clr>|<clrEnd>|<\/clr>/g, '');
}

function diffColor(diff) {
  if (diff === 'easy') return 'var(--green)';
  if (diff === 'medium') return 'var(--orange)';
  return 'var(--red)';
}

function diffLabel(diff) {
  return diff.charAt(0).toUpperCase() + diff.slice(1);
}

function sortQuests(quests) {
  const order = { easy: 0, medium: 1, hard: 2 };
  return [...quests].sort((a, b) => {
    const da = order[a.difficulty] ?? 3;
    const db = order[b.difficulty] ?? 3;
    return da !== db ? da - db : a.title.localeCompare(b.title);
  });
}

// ---- CohortBars (reusable distribution bars) ----

function CohortBars({ cohortLoc, playerChoiceNorm, activeFamily, onFamilyChange, families }) {
  if (!cohortLoc || cohortLoc.n < 5) {
    return <span style={{ color: 'var(--muted)', fontSize: '0.85rem' }}>Insufficient data for this location.</span>;
  }

  const choices = cohortLoc.choices || {};
  let total = 0;
  Object.values(choices).forEach(data => {
    const n = activeFamily === 'all'
      ? (data.n || 0)
      : (data.n_by_family && data.n_by_family[activeFamily] != null ? data.n_by_family[activeFamily] : 0);
    total += n;
  });

  const displayN = activeFamily === 'all' ? cohortLoc.n : total;

  return (
    <>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.75rem', flexWrap: 'wrap', gap: '0.5rem' }}>
        <span style={{ fontSize: '0.82rem', color: 'var(--muted)' }}>
          AI models chose ({displayN} runs)
        </span>
        {families.length > 0 && (
          <div style={{ display: 'flex', gap: '0.4rem', flexWrap: 'wrap' }}>
            {['all', ...families].map(fam => (
              <button
                key={fam}
                className={'family-pill' + (fam === activeFamily ? ' active' : '')}
                onClick={e => { e.stopPropagation(); onFamilyChange(fam); }}
              >
                {fam === 'all' ? 'All' : fam}
              </button>
            ))}
          </div>
        )}
      </div>
      <div>
        {Object.entries(choices).map(([key, data]) => {
          const isPlayer = normalizeChoice(key) === normalizeChoice(playerChoiceNorm || '');
          const n = activeFamily === 'all'
            ? (data.n || 0)
            : (data.n_by_family && data.n_by_family[activeFamily] != null ? data.n_by_family[activeFamily] : 0);
          const pct = total > 0 ? Math.round(n / total * 100) : 0;
          return (
            <div key={key} className={'cohort-row' + (isPlayer ? ' player-choice' : '')}>
              <div className="cohort-label">{data.text || key}</div>
              <div className="cohort-bar-wrap">
                <div className="success-bar"><div className="success-fill" style={{ width: pct + '%' }}></div></div>
                <span className="cohort-pct">{pct}%</span>
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

// ---- DecisionHistory ----

function DecisionHistory({ path, families }) {
  const [openIdx, setOpenIdx] = useState(null);
  const [activeFamily, setActiveFamily] = useState('all');

  const branchingSteps = path.filter(entry => entry.cohortLoc);
  if (branchingSteps.length === 0) return null;

  return (
    <div className="history-section">
      <div style={{ fontSize: '0.78rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--muted)', marginBottom: '0.5rem' }}>
        Decision History
      </div>
      {branchingSteps.map((entry, i) => {
        const isOpen = openIdx === i;
        return (
          <div key={i} className={'history-item' + (isOpen ? ' open' : '')}>
            <div className="history-header" onClick={() => setOpenIdx(isOpen ? null : i)}>
              <span className="history-step">#{entry.step}</span>
              <span className="history-choice">{entry.choiceText}</span>
              <span className="history-agree" style={{ color: entry.agreed ? 'var(--green)' : entry.agreed === false ? 'var(--red)' : 'var(--muted)' }}>
                {entry.agreed === true ? 'AI agreed' : entry.agreed === false ? 'AI disagreed' : ''}
              </span>
              <span className="history-chevron">&#9654;</span>
            </div>
            {isOpen && (
              <div className="cohort-inline">
                <CohortBars
                  cohortLoc={entry.cohortLoc}
                  playerChoiceNorm={entry.playerChoiceNorm}
                  activeFamily={activeFamily}
                  onFamilyChange={setActiveFamily}
                  families={families}
                />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ---- EndScreen ----

function EndScreen({ outcome, cohortWinRate, path, onPlayAgain, onTryAnother }) {
  const outcomeLabel = { win: 'SUCCESS', fail: 'FAILURE', dead: 'DEAD' }[outcome] || 'FAILURE';
  return (
    <div className="container py-5 text-center" style={{ maxWidth: 700 }}>
      <div className={'outcome-badge outcome-' + outcomeLabel} style={{ display: 'inline-block', marginBottom: '1rem' }}>
        {outcomeLabel}
      </div>
      {cohortWinRate != null && (
        <p style={{ color: 'var(--muted)', marginBottom: '1.5rem' }}>
          AI cohort: {Math.round(cohortWinRate * 100)}% won this quest.
        </p>
      )}
      <h5 style={{ textAlign: 'left', marginBottom: '0.5rem' }}>Your path</h5>
      <div className="card-table" style={{ marginBottom: '1.5rem' }}>
        <table className="table table-sm path-table">
          <thead>
            <tr>
              <th>Step</th>
              <th>Choice</th>
              <th>AI agreed?</th>
            </tr>
          </thead>
          <tbody>
            {path.map((entry, i) => (
              <tr key={i}>
                <td style={{ color: 'var(--muted)' }}>{entry.step}</td>
                <td>{entry.choiceText}</td>
                <td>
                  {entry.agreed === true && <span className="agree-yes">Yes</span>}
                  {entry.agreed === false && <span className="agree-no">No</span>}
                  {entry.agreed === null && <span className="agree-no">-</span>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center' }}>
        <button className="btn btn-primary" onClick={onPlayAgain}>Play Again</button>
        <button className="btn btn-outline-secondary" onClick={onTryAnother}>Try Another Quest</button>
      </div>
    </div>
  );
}

// ---- QuestPlay ----

function QuestPlay({ quest, cohortData, onQuit }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [player, setPlayer] = useState(null);
  const [gameState, setGameState] = useState(null);
  const [stepHistory, setStepHistory] = useState([]);
  const [stepNum, setStepNum] = useState(0);
  const [path, setPath] = useState([]);
  const [ended, setEnded] = useState(null);
  const [obsKey, setObsKey] = useState(0);

  useEffect(() => {
    const controller = new AbortController();
    setLoading(true);
    setError(null);
    fetch('play/quests/' + quest.id + '.qm.gz', { signal: controller.signal })
      .then(r => r.arrayBuffer())
      .then(buf => {
        const ungzipped = pako.ungzip(new Uint8Array(buf));
        const qm = QMEngine.parse(Buffer.from(ungzipped));
        const p = new QMEngine.QMPlayer(qm, 'eng');
        p.start();
        setPlayer(p);
        setGameState(p.getState());
        setStepNum(1);
        setLoading(false);
      })
      .catch(err => {
        if (err.name === 'AbortError') return;
        setError('Failed to load quest: ' + err.message);
        setLoading(false);
      });
    return () => controller.abort();
  }, [quest.id]);

  const families = (cohortData && cohortData.model_families) || [];

  function getCohortLoc(locationId) {
    if (!cohortData || !cohortData.locations) return null;
    return cohortData.locations[String(locationId)] || null;
  }

  function getMajorityChoice(cohortLoc) {
    const choices = cohortLoc.choices || {};
    let bestKey = null, bestVal = -1;
    Object.entries(choices).forEach(([key, data]) => {
      const val = data.dist && data.dist.all != null ? data.dist.all : 0;
      if (val > bestVal) { bestVal = val; bestKey = key; }
    });
    return bestKey;
  }

  function handleChoice(choice, activeChoices) {
    const locationId = player.getSaving().locationId;
    const choiceNorm = normalizeChoice(choice.text);
    const cohortLoc = getCohortLoc(locationId);
    const isBranching = activeChoices.length >= 2;
    const majority = (isBranching && cohortLoc) ? getMajorityChoice(cohortLoc) : null;
    const agreed = majority ? normalizeChoice(majority) === choiceNorm : null;

    setPath(prev => [...prev, {
      step: stepNum,
      choiceText: stripClr(choice.text),
      agreed: isBranching ? agreed : null,
      cohortLoc: isBranching ? cohortLoc : null,
      playerChoiceNorm: isBranching ? choiceNorm : null,
    }]);

    setStepHistory(prev => [...prev, player.getSaving()]);
    player.performJump(choice.jumpId);

    const nextState = player.getState();
    const gs = nextState.gameState;
    const isTerminal = gs === 'win' || gs === 'fail' || gs === 'dead';

    if (isTerminal) {
      setEnded(gs);
    } else {
      setGameState(player.getState());
      setStepNum(n => n + 1);
      setObsKey(k => k + 1);
    }
  }

  function handleBack() {
    if (stepHistory.length === 0) return;
    const prevSaving = stepHistory[stepHistory.length - 1];
    player.loadSaving(prevSaving);
    setStepHistory(prev => prev.slice(0, -1));
    setGameState(player.getState());
    setStepNum(n => Math.max(1, n - 1));
    setPath(prev => prev.slice(0, -1));
    setObsKey(k => k + 1);
    setEnded(null);
  }

  if (loading) {
    return (
      <div className="spinner-wrap">
        <div className="spinner-border text-secondary" role="status"></div>
        <span style={{ color: 'var(--muted)' }}>Loading quest...</span>
      </div>
    );
  }

  if (error) {
    return (
      <div className="container py-5" style={{ maxWidth: 700, textAlign: 'center' }}>
        <p style={{ color: 'var(--red)' }}>{error}</p>
        <button className="btn btn-outline-secondary" onClick={onQuit}>Back to quests</button>
      </div>
    );
  }

  if (ended) {
    return (
      <EndScreen
        outcome={ended}
        cohortWinRate={cohortData ? cohortData.win_rate : null}
        path={path}
        onPlayAgain={() => {
          player.start();
          setGameState(player.getState());
          setStepNum(1);
          setPath([]);
          setStepHistory([]);
          setEnded(null);
          setObsKey(k => k + 1);
        }}
        onTryAnother={onQuit}
      />
    );
  }

  if (!gameState) return null;

  const choices = gameState.choices || [];
  const activeChoices = choices.filter(c => c.active);
  const params = (gameState.paramsState || []).filter(p => p && p.trim());

  return (
    <div className="container py-4" style={{ maxWidth: 800 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1rem' }}>
        <div>
          <h4 style={{ marginBottom: 0 }}>{quest.title}</h4>
          <span style={{ color: 'var(--muted)', fontSize: '0.85rem' }}>Step {stepNum}</span>
        </div>
        <div style={{ display: 'flex', gap: '0.5rem' }}>
          {stepHistory.length > 0 && (
            <button className="btn btn-sm btn-outline-secondary" onClick={handleBack}>&#8592; Back</button>
          )}
          <button className="btn btn-sm btn-outline-secondary" onClick={onQuit}>Quit</button>
        </div>
      </div>

      {params.length > 0 && (
        <div className="params-strip">
          {params.map((p, i) => <span key={i} className="param-pill"><QuestTags str={p} /></span>)}
        </div>
      )}

      <div key={obsKey} className="obs-panel">
        <QuestTags str={gameState.text || ''} />
      </div>

      <div>
        {choices.map((choice, i) => (
          <button
            key={i}
            className={'choice-btn' + (choice.active ? '' : ' inactive')}
            disabled={!choice.active}
            onClick={() => choice.active && handleChoice(choice, activeChoices)}
          >
            <QuestTags str={choice.text || ''} />
          </button>
        ))}
      </div>

      <DecisionHistory path={path} families={families} />
    </div>
  );
}

// ---- QuestSelect ----

function QuestSelect({ onSelectQuest }) {
  const [quests, setQuests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');

  useEffect(() => {
    fetch('play/quest-index.json')
      .then(r => r.json())
      .then(data => {
        setQuests(sortQuests(data.quests || []));
        setLoading(false);
      })
      .catch(() => setLoading(false));
  }, []);

  const filtered = quests.filter(q =>
    !search || q.title.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="container py-5" style={{ maxWidth: 860 }}>
      <div style={{ marginBottom: '1.5rem' }}>
        <h2>Play a Quest</h2>
        <p style={{ color: 'var(--muted)' }}>Pick a quest, make your choices, then see what AI models chose at each decision point.</p>
      </div>

      <div style={{ marginBottom: '1.5rem' }}>
        <input
          className="search-input"
          type="text"
          placeholder="Search quests..."
          value={search}
          onChange={e => setSearch(e.target.value)}
        />
      </div>

      {loading ? (
        <div className="spinner-wrap">
          <div className="spinner-border text-secondary" role="status"></div>
          <span style={{ color: 'var(--muted)' }}>Loading quests...</span>
        </div>
      ) : (
        <div className="row g-3">
          {filtered.map(q => (
            <div key={q.id} className="col-md-4 col-sm-6">
              <div className="quest-card h-100" style={{ display: 'flex', flexDirection: 'column' }} onClick={() => onSelectQuest(q)}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '0.5rem' }}>
                  <h5 style={{ margin: 0 }}>{q.title}</h5>
                  <span className="diff-badge" style={{ color: diffColor(q.difficulty) }}>{diffLabel(q.difficulty)}</span>
                </div>
                <p style={{ color: 'var(--muted)', fontSize: '0.88rem', marginBottom: '0.5rem', flexGrow: 1 }}>{q.description}</p>
                <div style={{ fontSize: '0.82rem', color: 'var(--muted)', marginBottom: '0.25rem' }}>~{q.stepsRange} steps</div>
                <div style={{ fontSize: '0.82rem', color: 'var(--muted)', marginBottom: '0.75rem' }}>
                  AI win rate: {Math.round((q.win_rate || 0) * 100)}%
                </div>
                <button className="btn btn-sm btn-outline-primary" style={{ marginTop: 'auto' }} onClick={e => { e.stopPropagation(); onSelectQuest(q); }}>
                  Play
                </button>
              </div>
            </div>
          ))}
          {filtered.length === 0 && (
            <div className="col-12" style={{ color: 'var(--muted)', textAlign: 'center', padding: '2rem' }}>No quests found.</div>
          )}
        </div>
      )}
    </div>
  );
}

// ---- App ----

function App() {
  const [screen, setScreen] = useState('select');
  const [selectedQuest, setSelectedQuest] = useState(null);
  const [cohortData, setCohortData] = useState(null);
  const cohortReqSeq = useRef(0);

  function handleSelectQuest(quest) {
    const reqId = ++cohortReqSeq.current;
    setSelectedQuest(quest);
    setCohortData(null);
    setScreen('play');
    fetch('play/' + quest.id + '.json')
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (cohortReqSeq.current === reqId) setCohortData(data);
      })
      .catch(() => {
        if (cohortReqSeq.current === reqId) setCohortData(null);
      });
  }

  if (screen === 'select') {
    return <QuestSelect onSelectQuest={handleSelectQuest} />;
  }

  return (
    <QuestPlay
      quest={selectedQuest}
      cohortData={cohortData}
      onQuit={() => setScreen('select')}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
