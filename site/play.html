<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play - LLM-Quest Benchmark</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ZkaQRFN5HIMXOW5p6y0Sgis4On/radW4qBjeP+1vg+PA9798auxg2kOfySrHlvtM" crossorigin="anonymous">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-UC6WomM8A+f5gs+EgOnwkFVfIFR6eOI9MOpm9FqHLhATRpH4c2m9HTDGqUfLYMb3" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-jq4sMXNxl1vM0NMJktkrQ0nt31ULGdxyPoc1WzK7qNz/rhARVkeCFbZf9RfokPfy" crossorigin="anonymous"></script>
<script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js" integrity="sha384-3WwDEkVFNCnw10lPx0PfH8u5J3DJ0+t1QnscHG2+hInyImjp8ZGvR5bBNdkN6JXO" crossorigin="anonymous"></script>
<script src="play/qmengine.js"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #c9d1d9;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #d29922;
  --red: #f85149;
  --clr: #ffd863;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
.navbar { background: var(--surface); border-bottom: 1px solid var(--border); }
a { color: var(--accent); }
.text-muted { color: var(--muted) !important; }

.quest-card { cursor: pointer; transition: border-color 0.15s, transform 0.1s; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
.quest-card:hover { border-color: var(--accent); transform: translateY(-2px); }

.diff-badge { font-size: 0.75rem; font-weight: 700; padding: 0.2em 0.7em; border-radius: 12px; border: 1px solid currentColor; }

.obs-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem;
  line-height: 1.7; white-space: pre-wrap;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.params-strip { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
.param-pill { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 0.2rem 0.6rem; font-size: 0.78rem; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; }

.choice-btn { display: block; width: 100%; text-align: left; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 6px; cursor: pointer; font-size: 0.95rem; transition: border-color 0.15s; }
.choice-btn:hover:not(:disabled) { border-color: var(--accent); }
.choice-btn.inactive { opacity: 0.4; cursor: default; }
.choice-btn:disabled { cursor: default; }

.cohort-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-top: 1rem; animation: fadeIn 0.2s ease; }
.cohort-inline { padding: 1rem 1.25rem 1.25rem; border-top: 1px solid var(--border); }

.family-pill { background: var(--bg); border: 1px solid var(--border); color: var(--muted); padding: 0.2em 0.65em; border-radius: 12px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
.family-pill:hover, .family-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.history-section { margin-top: 1.5rem; }
.history-item { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 0.4rem; background: var(--surface); overflow: hidden; }
.history-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.55rem 1rem; cursor: pointer; user-select: none; transition: background 0.15s; }
.history-header:hover { background: rgba(88,166,255,0.05); }
.history-step { font-size: 0.75rem; font-weight: 700; color: var(--muted); min-width: 1.8rem; text-align: right; }
.history-choice { flex: 1; font-size: 0.88rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-agree { font-size: 0.78rem; font-weight: 600; }
.history-chevron { font-size: 0.6rem; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
.history-item.open .history-chevron { transform: rotate(90deg); }
.history-item .cohort-inline { display: none; }
.history-item.open .cohort-inline { display: block; }

.cohort-row { margin-bottom: 0.65rem; }
.cohort-row.player-choice { border-left: 3px solid var(--accent); padding-left: 0.5rem; background: rgba(88,166,255,0.06); border-radius: 0 4px 4px 0; }
.cohort-label { font-size: 0.85rem; margin-bottom: 0.25rem; color: var(--text); }
.cohort-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
.success-bar { height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; flex: 1; }
.success-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.3s; }
.cohort-pct { font-size: 0.8rem; color: var(--muted); min-width: 3rem; text-align: right; }

.outcome-badge { font-size: 1.1rem; font-weight: 700; padding: 0.4em 1.1em; border-radius: 6px; letter-spacing: 0.03em; }
.outcome-SUCCESS { background: var(--green); color: #0d1117; }
.outcome-FAILURE { background: var(--red); color: #fff; }
.outcome-DEAD { background: var(--red); color: #fff; }

.path-table { font-size: 0.88rem; }
.agree-yes { color: var(--green); }
.agree-no { color: var(--muted); }

.game-clr { color: var(--clr); }
.game-fix { font-family: 'SF Mono', 'Fira Code', monospace; white-space: pre; }

.spinner-wrap { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 3rem; }

.search-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.5rem 0.9rem; width: 100%; font-size: 0.95rem; outline: none; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }

.card-table { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.card-table .table { color: var(--text); margin-bottom: 0; }
.card-table .table th { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; padding: 0.5rem 1rem; border-color: var(--border); }
.card-table .table td { padding: 0.4rem 1rem; border-color: var(--border); }
</style>
</head>
<body>

<nav class="navbar navbar-dark py-3">
  <div class="container">
    <span class="navbar-brand mb-0 h1">LLM-Quest Benchmark</span>
    <div>
      <a href="about.html" class="text-decoration-none" style="color:var(--muted); margin-left:1.5rem">About</a>
      <a href="index.html" class="text-decoration-none" style="color:var(--muted); margin-left:1.5rem">Leaderboard</a>
      <a href="play.html" class="text-decoration-none" style="color:var(--accent); margin-left:1.5rem">Play</a>
      <a href="paper.html" class="text-decoration-none" style="color:var(--muted); margin-left:1.5rem">Paper</a>
      <a href="https://github.com/yourconscience/llm_quest_benchmark" class="text-decoration-none" style="color:var(--muted); margin-left:1.5rem">GitHub</a>
    </div>
  </div>
</nav>

<div id="root"></div>

<script src="play/app.js"></script>

</body>
</html>
