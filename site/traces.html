<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace Viewer - LLM-Quest Benchmark</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
<style>
:root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #c9d1d9; --accent: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
.navbar { background: var(--surface); border-bottom: 1px solid var(--border); }
.nav-link-custom { color: var(--muted); text-decoration: none; margin-left: 1.5rem; }
.nav-link-custom:hover, .nav-link-custom.active { color: var(--accent); }
.card { background: var(--surface); border: 1px solid var(--border); }
a { color: var(--accent); }

/* Drop zone */
#drop-zone {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  background: var(--surface);
}
#drop-zone:hover, #drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(88,166,255,0.05);
}
#drop-zone .drop-icon { font-size: 2.5rem; margin-bottom: 1rem; color: var(--muted); }
#drop-zone p { color: var(--muted); margin: 0; }
#drop-zone p strong { color: var(--text); }
#file-input { display: none; }

/* Header section */
#run-header { display: none; }
.outcome-badge {
  font-size: 0.9rem;
  font-weight: 700;
  padding: 0.35em 0.9em;
  border-radius: 6px;
  letter-spacing: 0.03em;
}
.outcome-SUCCESS { background: var(--green); color: #0d1117; }
.outcome-FAILURE { background: var(--red); color: #fff; }
.outcome-TIMEOUT { background: var(--orange); color: #0d1117; }

/* Summary stats */
.stat-pill {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.6rem 1rem;
  font-size: 0.85rem;
  color: var(--muted);
}
.stat-pill strong { color: var(--text); display: block; font-size: 1.05rem; }

/* Step timeline */
#timeline { display: none; }

.step-item {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 0.5rem;
  background: var(--surface);
  overflow: hidden;
}
.step-item.step-terminal {
  border-color: var(--orange);
}
.step-item.step-terminal .step-header {
  background: rgba(248,81,73,0.08);
}

.step-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 1rem;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.step-header:hover { background: rgba(88,166,255,0.05); }
.step-item.step-terminal .step-header:hover { background: rgba(248,81,73,0.12); }

.step-num {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--muted);
  min-width: 2.2rem;
  text-align: right;
}
.step-action-preview {
  flex: 1;
  font-size: 0.9rem;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.step-meta {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.terminal-badge {
  background: var(--orange);
  color: #0d1117;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.15em 0.5em;
  border-radius: 4px;
}
.error-badge {
  background: var(--orange);
  color: #0d1117;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 0.15em 0.5em;
  border-radius: 4px;
}
.chevron {
  font-size: 0.65rem;
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.step-item.open .chevron { transform: rotate(90deg); }

/* Step detail panel */
.step-detail {
  display: none;
  padding: 1rem 1.25rem 1.25rem;
  border-top: 1px solid var(--border);
}
.step-item.open .step-detail { display: block; }

.detail-label {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}
.observation-text {
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.75rem 1rem;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
}
.choices-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.choices-list li {
  font-size: 0.88rem;
  padding: 0.4rem 0.75rem;
  border-radius: 5px;
  margin-bottom: 0.3rem;
  border: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  gap: 0.6rem;
}
.choices-list li.chosen {
  border-color: var(--accent);
  background: rgba(88,166,255,0.1);
  color: var(--accent);
  font-weight: 600;
}
.choice-key {
  font-weight: 700;
  min-width: 1.5rem;
  color: var(--muted);
}
.choices-list li.chosen .choice-key { color: var(--accent); }

.reasoning-text {
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--muted);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.75rem 1rem;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 200px;
  overflow-y: auto;
}
.parse-mode-tag {
  font-size: 0.72rem;
  padding: 0.2em 0.6em;
  border-radius: 4px;
  background: var(--border);
  color: var(--muted);
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.parse-mode-error_default { background: rgba(210,153,34,0.3); color: var(--orange); }
.parse-mode-json_parsed { background: rgba(63,185,80,0.2); color: var(--green); }
.token-info { font-size: 0.8rem; color: var(--muted); }

/* Expand/collapse all */
.controls-bar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1rem;
}
.ctrl-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.3em 0.8em;
  border-radius: 6px;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.15s;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

.text-muted { color: var(--muted) !important; }
</style>
</head>
<body>

<nav class="navbar navbar-dark py-3">
  <div class="container d-flex align-items-center">
    <span class="navbar-brand mb-0 h1">LLM-Quest Benchmark</span>
    <div>
      <a href="about.html" class="nav-link-custom">About</a>
      <a href="index.html" class="nav-link-custom">Leaderboard</a>
      <a href="play.html" class="nav-link-custom">Play</a>
      <a href="https://github.com/yourconscience/llm_quest_benchmark" class="nav-link-custom" title="GitHub"><svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:middle"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
    </div>
  </div>
</nav>

<div class="container py-4" style="max-width: 900px;">

  <!-- Drop zone -->
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">&#128196;</div>
    <p><strong>Drop run_summary.json here</strong></p>
    <p style="margin-top:0.4rem; font-size:0.88rem">or click to select a file</p>
    <input type="file" id="file-input" accept=".json,application/json">
  </div>

  <!-- Run header -->
  <div id="run-header" class="mt-4">
    <div class="d-flex flex-wrap align-items-start gap-3 mb-3">
      <div>
        <h3 class="mb-1" id="hdr-quest" style="font-size:1.5rem"></h3>
        <div id="hdr-agent" style="font-size:0.88rem; color:var(--muted); font-family:'SF Mono','Fira Code',monospace"></div>
      </div>
      <div class="ms-auto d-flex align-items-center gap-2 flex-wrap">
        <span id="hdr-outcome" class="outcome-badge"></span>
      </div>
    </div>
    <div class="d-flex flex-wrap gap-2 mb-4" id="stat-pills"></div>
  </div>

  <!-- Timeline -->
  <div id="timeline">
    <div class="controls-bar">
      <span style="font-size:0.85rem; color:var(--muted); margin-right:auto" id="steps-label"></span>
      <button class="ctrl-btn" id="btn-expand-all">Expand all</button>
      <button class="ctrl-btn" id="btn-collapse-all">Collapse all</button>
    </div>
    <div id="steps-container"></div>
  </div>

</div>

<script>
(function () {
  'use strict';

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // URL parameter loader: ?file=path/to/run_summary.json or ?dir=path/to/traces/
  const params = new URLSearchParams(window.location.search);
  const fileParam = params.get('file');
  const dirParam = params.get('dir');

  if (fileParam) {
    const filePath = fileParam.startsWith('/') ? fileParam : '/' + fileParam;
    loadFromUrl(filePath);
  }

  function loadFromUrl(url) {
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
      .then(data => render(data))
      .catch(err => console.error('Load failed:', url, err));
  }

  if (dirParam) {
    const dirPath = dirParam.startsWith('/') ? dirParam : '/' + dirParam;
    fetch(dirPath + '/manifest.json')
      .then(r => r.json())
      .then(files => {
        const listDiv = document.createElement('div');
        listDiv.className = 'card p-3 mb-3';
        listDiv.innerHTML = '<h6 style="color:var(--muted)">Traces in ' + esc(dirParam) + '</h6>';
        const ul = document.createElement('div');
        ul.style.cssText = 'display:flex;flex-wrap:wrap;gap:0.4rem';
        files.forEach(f => {
          const a = document.createElement('a');
          a.href = '#';
          a.textContent = f.replace('.json','');
          const traceUrl = dirPath + '/' + f;
          a.addEventListener('click', e => { e.preventDefault(); loadFromUrl(traceUrl); });
          a.style.cssText = 'font-size:0.8rem;padding:0.25rem 0.5rem;border:1px solid var(--border);border-radius:4px;text-decoration:none;cursor:pointer;' +
            (f.includes('SUCCESS') ? 'border-color:var(--green);color:var(--green)' : '');
          ul.appendChild(a);
        });
        listDiv.appendChild(ul);
        document.getElementById('drop-zone').parentNode.insertBefore(listDiv, document.getElementById('drop-zone'));
        // Auto-load first file if no specific file requested
        if (!fileParam && files.length > 0) loadFromUrl(dirPath + '/' + files[0]);
      })
      .catch(() => {}); // no manifest, skip index
  }

  // Drag-drop setup
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        render(data);
      } catch (err) {
        console.error('Failed to parse JSON:', err.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  }

  function fmt(n, digits) {
    if (n == null || n === undefined) return '-';
    return Number(n).toLocaleString('en-US', { maximumFractionDigits: digits != null ? digits : 2 });
  }

  function fmtDur(secs) {
    if (secs == null) return '-';
    if (secs < 60) return secs.toFixed(1) + 's';
    return (secs / 60).toFixed(1) + 'min';
  }

  function getChosenKey(choice) {
    if (!choice || typeof choice !== 'object') return null;
    return Object.keys(choice)[0] || null;
  }

  function isTerminalStep(step) {
    return step.is_terminal === true;
  }

  function render(data) {
    const steps = data.steps || [];
    const metrics = data.metrics || {};
    const usage = data.usage || {};

    // Show header
    document.getElementById('run-header').style.display = 'block';
    document.getElementById('hdr-quest').textContent = data.quest_name || data.quest_file || 'Unknown Quest';
    document.getElementById('hdr-agent').textContent = data.agent_id || '';

    const outcome = (data.outcome || '').toUpperCase();
    const outcomeBadge = document.getElementById('hdr-outcome');
    outcomeBadge.textContent = outcome || 'UNKNOWN';
    outcomeBadge.className = 'outcome-badge outcome-' + (outcome || 'UNKNOWN');

    // Stats pills
    const totalTokens = usage.total_tokens || (usage.prompt_tokens || 0) + (usage.completion_tokens || 0);
    const cost = usage.estimated_cost_usd;
    const pills = [
      { label: 'Steps', value: metrics.total_steps != null ? metrics.total_steps : steps.length },
      { label: 'Reward', value: data.reward != null ? fmt(data.reward, 0) : '-' },
      { label: 'Duration', value: fmtDur(data.run_duration) },
      { label: 'Total Tokens', value: totalTokens ? fmt(totalTokens, 0) : '-' },
      { label: 'Cost', value: cost != null ? ('$' + cost.toFixed(4)) : '-' },
    ];
    document.getElementById('stat-pills').innerHTML = pills.map(p =>
      `<div class="stat-pill"><strong>${esc(String(p.value))}</strong>${esc(p.label)}</div>`
    ).join('');

    // Timeline
    document.getElementById('timeline').style.display = 'block';
    document.getElementById('steps-label').textContent = steps.length + ' steps';

    const container = document.getElementById('steps-container');
    container.innerHTML = '';

    steps.forEach((step, idx) => {
      const dec = step.llm_decision || {};
      const chosenKey = getChosenKey(dec.choice);
      const chosenText = chosenKey ? (dec.choice[chosenKey] || '') : '';
      const isTerminal = isTerminalStep(step);
      const isError = dec.parse_mode === 'error_default';
      const isSingleAuto = dec.reasoning === 'auto_single_choice';

      // Collapsed preview: chosen action or error label
      const previewText = chosenText || (chosenKey ? 'Choice ' + chosenKey : 'No choice');

      // Tokens
      const pt = dec.prompt_tokens || 0;
      const ct = dec.completion_tokens || 0;
      const stepTokens = pt + ct;

      const item = document.createElement('div');
      item.className = 'step-item' + (isTerminal ? ' step-terminal' : '');

      // Build choices HTML
      const choices = step.choices || {};
      const choicesHtml = Object.keys(choices).length === 0 ? '<span style="color:var(--muted);font-size:0.85rem">No choices available</span>' :
        '<ul class="choices-list">' +
        Object.entries(choices).map(([k, v]) =>
          `<li class="${k === chosenKey ? 'chosen' : ''}"><span class="choice-key">${esc(k)}.</span><span>${esc(v)}</span></li>`
        ).join('') +
        '</ul>';

      // Parse mode tag
      const pm = dec.parse_mode;
      const pmHtml = pm ? `<span class="parse-mode-tag parse-mode-${esc(pm)}">${esc(pm)}</span>` : '';

      // Reasoning / analysis
      const reasoning = dec.reasoning && dec.reasoning !== 'auto_single_choice' ? dec.reasoning : null;
      const analysis = dec.analysis || null;
      const memo = dec.memo || null;
      let reasoningHtml = '';
      if (analysis) {
        reasoningHtml += `<div class="detail-label mt-3">Analysis</div><div class="reasoning-text">${esc(analysis)}</div>`;
      }
      if (reasoning) {
        reasoningHtml += `<div class="detail-label mt-3">Reasoning</div><div class="reasoning-text">${esc(reasoning)}</div>`;
      }
      if (memo) {
        reasoningHtml += `<div class="detail-label mt-3">Memo</div><div class="reasoning-text">${esc(memo)}</div>`;
      }
      const toolCalls = dec.tool_calls;
      if (toolCalls && toolCalls.length > 0) {
        const tcHtml = toolCalls.map(tc => {
          const args = tc.operation ? `${tc.tool}(${tc.operation}, ${tc.content || tc.input})` : `${tc.tool}(${tc.input})`;
          return esc(args);
        }).join('<br>');
        reasoningHtml += `<div class="detail-label mt-3">Tool Calls</div><div class="reasoning-text" style="font-family:monospace;font-size:0.82rem">${tcHtml}</div>`;
      }
      const toolResults = dec.tool_results;
      if (toolResults && toolResults.length > 0) {
        const trHtml = toolResults.map(tr => esc(typeof tr === 'string' ? tr : JSON.stringify(tr))).join('<br>');
        reasoningHtml += `<div class="detail-label mt-3">Tool Results</div><div class="reasoning-text" style="font-family:monospace;font-size:0.82rem">${trHtml}</div>`;
      }

      item.innerHTML = `
        <div class="step-header">
          <span class="step-num">#${step.step}</span>
          <span class="step-action-preview">${esc(previewText)}</span>
          <span class="step-meta">
            ${isTerminal ? '<span class="terminal-badge">' + esc((data.outcome || 'END').toUpperCase()) + '</span>' : ''}
            ${isError ? '<span class="error-badge">ERROR</span>' : ''}
            ${isSingleAuto ? '<span style="font-size:0.72rem;color:var(--muted)">auto</span>' : ''}
            ${stepTokens > 0 ? `<span>${fmt(stepTokens, 0)} tok</span>` : ''}
          </span>
          <span class="chevron">&#9654;</span>
        </div>
        <div class="step-detail">
          <div class="detail-label">Observation</div>
          <div class="observation-text">${esc(step.observation || '')}</div>

          <div class="detail-label mt-3">Choices</div>
          ${choicesHtml}

          ${reasoningHtml}

          <div class="d-flex align-items-center gap-2 mt-3 flex-wrap">
            ${pmHtml}
            ${stepTokens > 0
              ? `<span class="token-info">prompt: ${fmt(pt, 0)} + completion: ${fmt(ct, 0)} = ${fmt(stepTokens, 0)} tokens</span>`
              : ''}
          </div>
        </div>
      `;

      item.querySelector('.step-header').addEventListener('click', () => {
        item.classList.toggle('open');
      });

      container.appendChild(item);
    });

    // Expand/collapse all
    document.getElementById('btn-expand-all').onclick = () => {
      container.querySelectorAll('.step-item').forEach(el => el.classList.add('open'));
    };
    document.getElementById('btn-collapse-all').onclick = () => {
      container.querySelectorAll('.step-item').forEach(el => el.classList.remove('open'));
    };

    document.getElementById('timeline').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
})();
</script>
</body>
</html>
