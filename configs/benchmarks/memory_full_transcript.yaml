  - quests/sr_2_1_2121_eng/Foncers_eng.qm
  - quests/sr_2_1_2121_eng/Leonardo_eng.qm
  - quests/sr_2_1_2121_eng/Ministry_eng.qm
  - quests/sr_2_1_2121_eng/Pizza_eng.qm
  - quests/sr_2_1_2121_eng/Prison_eng.qm
