# KR1 benchmark configuration

quests:
  - quests/kr_1_ru

agents:
  - model: gpt-5-mini
    harness: reasoning_recent
    temperature: 0.4
    skip_single: true

  - model: claude-sonnet-4-5
    harness: reasoning_recent
    temperature: 0.4
    skip_single: true

  - model: gemini-2.5-flash
    harness: reasoning_recent
    temperature: 0.4
    skip_single: true

  - model: deepseek-3.2-chat
    harness: reasoning_recent
    temperature: 0.4
    skip_single: true

debug: false
quest_timeout: 60
output_dir: results/benchmarks
name: kr1
